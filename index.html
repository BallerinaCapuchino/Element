<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaxTown Bank</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* === НАСТРОЙКИ ДИЗАЙНА (CSS) === */
        :root {
            --bg-color: #0f0f11;
            --surface-color: #1c1c1e;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-color: #ffffff;
            --text-secondary: #8e8e93;
            --danger-color: #ff453a;
            --success-color: #32d74b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 1. БАНКОВСКАЯ КАРТА */
        .card-container {
            perspective: 1000px;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInDown 0.8s ease forwards;
        }

        .bank-card {
            background: var(--primary-gradient);
            border-radius: 20px;
            padding: 25px;
            color: white;
            box-shadow: 0 15px 35px rgba(118, 75, 162, 0.4);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .bank-card:active { transform: scale(0.98); }
        .bank-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); pointer-events: none;
        }
        .card-balance-label { font-size: 14px; opacity: 0.8; margin-bottom: 5px; }
        .card-balance { font-size: 38px; font-weight: 700; letter-spacing: 1px; margin-bottom: 25px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .card-number { font-family: 'Courier New', monospace; letter-spacing: 3px; font-size: 16px; opacity: 0.9; }
        .card-logo { font-weight: bold; font-style: italic; font-size: 18px; }

        /* 2. БЛОК СТАТИСТИКИ (ДИАГРАММА) */
        .stats-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--surface-color);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.15s forwards;
        }

        .chart-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Сам круг */
        .donut-chart {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* Градиент будет меняться через JS */
            background: conic-gradient(var(--surface-color) 0deg 360deg); 
            transition: background 0.5s ease;
        }

        /* Дырка в бублике */
        .donut-hole {
            position: absolute;
            width: 70%;
            height: 70%;
            background-color: var(--surface-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-secondary);
            flex-direction: column;
        }

        .stats-info {
            flex: 1;
            margin-left: 20px;
        }
        
        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; }
        .stat-name { flex: 1; }
        .stat-val { font-weight: 600; }

        /* 3. ПЕРЕКЛЮЧАТЕЛЬ ПЕРИОДА */
        .period-selector {
            display: flex;
            background-color: var(--surface-color);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.2s forwards;
        }

        .period-btn {
            flex: 1; border: none; background: none; color: var(--text-secondary);
            padding: 10px; font-size: 14px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-weight: 500;
        }
        .period-btn.active { background-color: #3a3a3c; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        /* 4. СПИСОК ТРАТ */
        .transactions-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; padding-left: 5px; opacity: 0; animation: fadeIn 0.8s ease 0.3s forwards; }
        .transactions-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }

        .transaction-item {
            background-color: var(--surface-color); border-radius: 16px; padding: 16px; display: flex;
            align-items: center; justify-content: space-between; opacity: 0; transform: translateY(20px);
        }
        .transaction-item:active { background-color: #2c2c2e; transform: scale(0.98); }

        .t-left { display: flex; align-items: center; gap: 15px; }
        .t-icon { width: 40px; height: 40px; border-radius: 50%; background-color: #2c2c2e; display: flex; align-items: center; justify-content: center; font-size: 20px; position: relative; }
        /* Цветной кружок внутри иконки */
        .t-icon::after {
            content: ''; position: absolute; top: -2px; right: -2px; width: 10px; height: 10px;
            border-radius: 50%; background-color: var(--cat-color, transparent); border: 2px solid var(--surface-color);
        }

        .t-info { display: flex; flex-direction: column; gap: 4px; }
        .t-title { font-size: 16px; font-weight: 500; }
        .t-date { font-size: 12px; color: var(--text-secondary); }
        .t-amount { font-size: 16px; font-weight: 600; }
        
        .expense { color: var(--text-color); }
        .income { color: var(--success-color); }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .skeleton { background: linear-gradient(90deg, #1c1c1e 25%, #2c2c2e 50%, #1c1c1e 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 4px; color: transparent !important; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="card-container">
            <div class="bank-card">
                <div class="card-balance-label">Общий баланс</div>
                <div class="card-balance" id="mainBalance">0 MT$</div>
                <div class="card-footer">
                    <div class="card-number">**** 7219</div>
                    <div class="card-logo">MT Bank</div>
                </div>
            </div>
        </div>

        <div class="period-selector">
            <button class="period-btn" onclick="filterData('week', this)">Неделя</button>
            <button class="period-btn active" onclick="filterData('month', this)">Месяц</button>
            <button class="period-btn" onclick="filterData('year', this)">Все время</button>
        </div>

        <div class="stats-section">
            <div class="chart-wrapper">
                <div class="donut-chart" id="chart"></div>
                <div class="donut-hole">
                    <span style="font-size: 10px;">Расход</span>
                    <span id="totalExpense" style="color: white; font-size: 14px;">0</span>
                </div>
            </div>
            <div class="stats-info" id="statsLegend">
                </div>
        </div>

        <div class="transactions-header">История операций</div>

        <div class="transactions-list" id="list">
            <div class="transaction-item skeleton" style="height: 72px;"></div>
            <div class="transaction-item skeleton" style="height: 72px;"></div>
        </div>

    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0f0f11');
        tg.setBackgroundColor('#0f0f11');

        // === ДАННЫЕ С ЦВЕТАМИ КАТЕГОРИЙ ===
        // colors: hex код для диаграммы
        const mockData = {
            'week': [
                { title: 'Пятерочка', date: 'Сегодня, 14:20', amount: -1500, icon: '🛒', color: '#ff9f0a' }, // Еда (Оранжевый)
                { title: 'Перевод (Максим)', date: 'Вчера, 10:00', amount: +5000, icon: '💸', color: '#32d74b' }, // Доход (Зеленый)
                { title: 'Метро', date: 'Вчера, 08:30', amount: -56, icon: '🚇', color: '#0a84ff' } // Транспорт (Синий)
            ],
            'month': [
                { title: 'Магазин Apple', date: '20 дек', amount: -120000, icon: '📱', color: '#bf5af2' }, // Техника (Фиолетовый)
                { title: 'Зарплата', date: '15 дек', amount: +250000, icon: '💰', color: '#32d74b' },
                { title: 'Кафе "У Ашота"', date: '12 дек', amount: -1200, icon: '🍔', color: '#ff9f0a' },
                { title: 'Такси', date: '10 дек', amount: -450, icon: '🚖', color: '#0a84ff' },
                { title: 'Steam', date: '05 дек', amount: -2500, icon: '🎮', color: '#5e5ce6' } // Развлечения (Индиго)
            ],
            'year': [
                { title: 'Покупка Машины', date: '01 июн', amount: -1500000, icon: '🚗', color: '#ff453a' }, // Авто (Красный)
                { title: 'Кредит (Одобрен)', date: '20 мая', amount: +500000, icon: '🏦', color: '#32d74b' }
            ]
        };

        const urlParams = new URLSearchParams(window.location.search);
        const userBalance = urlParams.get('bal') || '0';
        
        animateValue("mainBalance", 0, parseInt(userBalance), 1000);

        setTimeout(() => {
            filterData('month', document.querySelectorAll('.period-btn')[1]);
        }, 800);

        function filterData(period, btnElement) {
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            const items = mockData[period] || [];
            
            // Сначала рисуем диаграмму
            renderChart(items);
            // Потом список
            renderList(items);
        }

        // === ФУНКЦИЯ ОТРИСОВКИ ДИАГРАММЫ ===
        function renderChart(items) {
            // 1. Считаем сумму расходов по цветам
            let totalExpense = 0;
            let categories = {}; // { "#color": { sum: 100, name: "Категория" } }

            items.forEach(item => {
                if (item.amount < 0) {
                    const val = Math.abs(item.amount);
                    totalExpense += val;
                    if (!categories[item.color]) {
                        categories[item.color] = 0;
                    }
                    categories[item.color] += val;
                }
            });

            // Обновляем цифру внутри круга (сокращаем k/m)
            document.getElementById('totalExpense').innerText = formatCompactNumber(totalExpense);

            // 2. Строим CSS градиент
            const chartDiv = document.getElementById('chart');
            const legendDiv = document.getElementById('statsLegend');
            legendDiv.innerHTML = '';

            if (totalExpense === 0) {
                chartDiv.style.background = `conic-gradient(#2c2c2e 0deg 360deg)`;
                legendDiv.innerHTML = '<div style="color:#555; font-size:12px">Нет расходов</div>';
                return;
            }

            let gradientStr = [];
            let currentAngle = 0;

            // Сортируем категории по сумме (чтобы большие куски шли первыми)
            const sortedCats = Object.entries(categories).sort((a, b) => b[1] - a[1]);

            sortedCats.forEach(([color, sum]) => {
                const percentage = sum / totalExpense;
                const degrees = percentage * 360;
                
                gradientStr.push(`${color} ${currentAngle}deg ${currentAngle + degrees}deg`);
                currentAngle += degrees;

                // Добавляем строку в легенду
                const percentText = Math.round(percentage * 100) + '%';
                const el = document.createElement('div');
                el.className = 'stat-row';
                el.innerHTML = `
                    <div class="dot" style="background-color: ${color}"></div>
                    <div class="stat-name">${getCategoryName(color)}</div>
                    <div class="stat-val">${percentText}</div>
                `;
                legendDiv.appendChild(el);
            });

            // Применяем градиент
            chartDiv.style.background = `conic-gradient(${gradientStr.join(', ')})`;
        }

        // Хелпер для имен категорий (в реальном приложении это приходит с бэкенда)
        function getCategoryName(color) {
            if (color === '#ff9f0a') return 'Еда';
            if (color === '#0a84ff') return 'Транспорт';
            if (color === '#bf5af2') return 'Техника';
            if (color === '#5e5ce6') return 'Развлечения';
            if (color === '#ff453a') return 'Авто';
            return 'Прочее';
        }

        function formatCompactNumber(number) {
            const formatter = Intl.NumberFormat("en", { notation: "compact" });
            return formatter.format(number);
        }

        function renderList(items) {
            const list = document.getElementById('list');
            list.innerHTML = '';

            if (items.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding: 20px; color: #555;">Пусто...</div>';
                return;
            }

            items.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'transaction-item';
                el.style.animation = `slideUp 0.5s ease ${index * 0.05}s forwards`;
                
                const amountClass = item.amount > 0 ? 'income' : 'expense';
                const sign = item.amount > 0 ? '+' : '';
                const formattedAmount = new Intl.NumberFormat('ru-RU').format(item.amount);

                // Передаем цвет иконки через CSS переменную
                el.style.setProperty('--cat-color', item.amount > 0 ? 'transparent' : item.color);

                el.innerHTML = `
                    <div class="t-left">
                        <div class="t-icon">${item.icon}</div>
                        <div class="t-info">
                            <div class="t-title">${item.title}</div>
                            <div class="t-date">${item.date}</div>
                        </div>
                    </div>
                    <div class="t-amount ${amountClass}">${sign}${formattedAmount} MT$</div>
                `;
                list.appendChild(el);
            });
        }

        function animateValue(id, start, end, duration) {
            if (isNaN(end)) end = 0;
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const value = Math.floor(progress * (end - start) + start);
                obj.innerHTML = new Intl.NumberFormat('ru-RU').format(value) + " MT$";
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
