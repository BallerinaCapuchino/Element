<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaxTown Bank</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg-color: #0f0f11; --surface-color: #1c1c1e; --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); --text-color: #ffffff; --text-secondary: #8e8e93; --danger-color: #ff453a; --success-color: #32d74b; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, sans-serif; margin: 0; padding: 0; user-select: none; }
        .app-container { padding: 20px; max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .bank-card { background: var(--primary-gradient); border-radius: 20px; padding: 25px; color: white; margin-bottom: 20px; position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(118, 75, 162, 0.4); }
        .card-balance-label { font-size: 14px; opacity: 0.8; margin-bottom: 5px; }
        .card-balance { font-size: 38px; font-weight: 700; letter-spacing: 1px; margin-bottom: 25px; }
        .stats-section { display: flex; align-items: center; justify-content: space-between; background-color: var(--surface-color); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .chart-wrapper { position: relative; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
        .donut-chart { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#2c2c2e 0deg 360deg); }
        .donut-hole { position: absolute; width: 70%; height: 70%; background-color: var(--surface-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; font-size: 12px; color: var(--text-secondary); }
        .stats-info { flex: 1; margin-left: 20px; }
        .stat-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; }
        .transactions-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        .transaction-item { background-color: var(--surface-color); border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; }
        .t-left { display: flex; align-items: center; gap: 15px; }
        .t-icon { width: 40px; height: 40px; border-radius: 50%; background-color: #2c2c2e; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .t-info { display: flex; flex-direction: column; gap: 4px; }
        .t-title { font-size: 16px; font-weight: 500; }
        .t-date { font-size: 12px; color: var(--text-secondary); }
        .t-amount { font-size: 16px; font-weight: 600; }
        .income { color: var(--success-color); }
        .loading { text-align: center; color: #555; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="bank-card">
            <div class="card-balance-label">Общий баланс</div>
            <div class="card-balance" id="mainBalance">...</div>
            <div style="opacity: 0.8; letter-spacing: 2px;">**** 7219</div>
        </div>

        <div class="stats-section">
            <div class="chart-wrapper">
                <div class="donut-chart" id="chart"></div>
                <div class="donut-hole">
                    <span>Расход</span>
                    <span id="totalExpense" style="color: white; font-size: 14px;">0</span>
                </div>
            </div>
            <div class="stats-info" id="statsLegend"></div>
        </div>

        <div style="font-size: 18px; font-weight: bold; margin-bottom: 15px;">История операций</div>
        <div class="transactions-list" id="list">
            <div class="loading">Ожидание данных от бота...</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0f0f11');
        tg.setBackgroundColor('#0f0f11');

        // Функция чтения данных из ссылки
        function getDataFromUrl() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const encoded = urlParams.get('data');
                if (!encoded) return null;
                // Декодируем Base64 -> JSON
                const jsonStr = decodeURIComponent(escape(atob(encoded)));
                return JSON.parse(jsonStr);
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        const appData = getDataFromUrl();

        if (appData) {
            // Если данные есть - показываем их
            document.getElementById('mainBalance').innerText = new Intl.NumberFormat('ru-RU').format(appData.balance) + " MT$";
            renderChart(appData.history);
            renderList(appData.history);
        } else {
            // Если данных нет - пишем ошибку (или демо)
            document.getElementById('mainBalance').innerText = "Ошибка";
            document.querySelector('.loading').innerText = "Откройте приложение через Бот!";
        }

        function renderList(items) {
            const list = document.getElementById('list');
            list.innerHTML = '';
            if (!items || items.length === 0) {
                list.innerHTML = '<div class="loading">История пуста</div>';
                return;
            }
            items.forEach(item => {
                const amountClass = item.amount > 0 ? 'income' : '';
                const sign = item.amount > 0 ? '+' : '';
                const color = item.color || '#8e8e93';
                
                list.innerHTML += `
                <div class="transaction-item">
                    <div class="t-left">
                        <div class="t-icon" style="color:${color}">${item.icon || '•'}</div>
                        <div class="t-info">
                            <div class="t-title">${item.title}</div>
                            <div class="t-date">${item.date}</div>
                        </div>
                    </div>
                    <div class="t-amount ${amountClass}">${sign}${item.amount} MT$</div>
                </div>`;
            });
        }

        function renderChart(items) {
            let total = 0;
            let cats = {};
            items.forEach(i => {
                if (i.amount < 0) {
                    const v = Math.abs(i.amount);
                    total += v;
                    if(!cats[i.color]) cats[i.color] = 0;
                    cats[i.color] += v;
                }
            });
            
            document.getElementById('totalExpense').innerText = total;
            
            if (total === 0) return;

            let grad = [], angle = 0;
            const legend = document.getElementById('statsLegend');
            legend.innerHTML = '';

            Object.entries(cats).forEach(([color, sum]) => {
                const deg = (sum / total) * 360;
                grad.push(`${color} ${angle}deg ${angle + deg}deg`);
                angle += deg;
                
                legend.innerHTML += `
                <div class="stat-row">
                    <div class="dot" style="background-color: ${color}"></div>
                    <div class="stat-name">Категория</div>
                    <div class="stat-val">${Math.round(sum/total*100)}%</div>
                </div>`;
            });
            document.getElementById('chart').style.background = `conic-gradient(${grad.join(', ')})`;
        }
    </script>
</body>
</html>
